name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@c0437e8d7de78564b4c3a1db710f43ce407e509b # v1.59.0
        with:
          fetch_depth: 0
          shell: release

      - name: Release to GitHub
        run: flake-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: |
            packages.x86_64-linux.default.aarch64-unknown-linux-musl
            packages.x86_64-linux.default.armv7l-unknown-linux-musleabihf
            packages.x86_64-linux.default.x86_64-unknown-linux-musl
            images.x86_64-linux.default.aarch64-unknown-linux-musl
            images.x86_64-linux.default.x86_64-unknown-linux-musl

      - name: Release to FlakeHub
        uses: DeterminateSystems/flakehub-push@71f57208810a5d299fc6545350981de98fdbc860 # v6
        with:
          visibility: public

  darwin:
    runs-on: macos-26
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@c0437e8d7de78564b4c3a1db710f43ce407e509b # v1.59.0
        with:
          fetch_depth: 0
          shell: release

      - name: Release to GitHub
        run: flake-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: |
            packages.aarch64-darwin
            packages.aarch64-darwin.default.x86_64-apple-darwin

  check-action:
    name: check action
    needs: linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run action
        uses: ./
        with:
          arguments: --file tests/bad.nix

      - name: Check diff
        run: diff tests/bad.nix tests/good.nix || exit 1
