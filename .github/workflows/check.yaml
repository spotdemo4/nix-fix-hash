name: check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@d2afabdda2558d6cf558962bbc7dce09ff5e9950 # v1.55.0
        with:
          shell: check

      - name: Configure NIX_PATH
        run: |
          nixpkgs=$(nix eval --raw --impure --expr '(builtins.getFlake (builtins.toString ./.)).inputs.nixpkgs.outPath')
          echo "NIX_PATH=nixpkgs=$nixpkgs${NIX_PATH:+:$NIX_PATH}" >> "$GITHUB_ENV"

      - name: Check
        run: nix flake check

      - name: Test
        run: cargo test -- --ignored
